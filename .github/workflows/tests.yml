name: Selenium E2E Tests

permissions:
  contents: write

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  TEST_USERNAME: ${{ secrets.USERNAME }}
  TEST_PASSWORD: ${{ secrets.PASSWORD }}
  HEADLESS: true
  CI: true

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: |
          pip install -r requirements.txt
          pip install pytest-xdist pytest-html pytest-rerunfailures

      - uses: browser-actions/setup-chrome@v1

      - uses: browser-actions/setup-firefox@v1

      - run: |
          pytest -n 2 --browser=${{ matrix.browser }} --reruns 2 --html=reports/${{ matrix.browser }}-report.html --self-contained-html

      - uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.browser }}
          path: reports/${{ matrix.browser }}-report.html

      - uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.browser }}
          path: logs/

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/

      - run: |
          cp reports/${{ matrix.browser }}-report.html reports/index-${{ matrix.browser }}.html

      - if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports