name: Selenium E2E Tests

permissions:
  contents: write

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  TEST_USERNAME: ${{ secrets.USERNAME }}
  TEST_PASSWORD: ${{ secrets.PASSWORD }}
  HEADLESS: true
  CI: true

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-xdist pytest-rerunfailures

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version: "18"

      - name: Install Newman
        run: npm install -g newman      

      - uses: browser-actions/setup-chrome@v1
      - uses: browser-actions/setup-firefox@v1

      - name: Run UI tests
        run: |
          pytest tests -n 2 --browser=${{ matrix.browser }} --reruns 2 --alluredir=allure-results

      - name: Run API tests
        run: |
          pytest api_tests --alluredir=allure-results

      - name: Run Hybrid tests
        run: |
          pytest tests_hybrid --browser=${{ matrix.browser }} --alluredir=allure-results

      - name: Run Postman collection
        run: |
          newman run postman/collection.json

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results

  report:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          path: allure-results

      - name: Merge results
        run: |
          mkdir merged-results
          find allure-results -type f -exec cp {} merged-results/ \;

      - name: Load history
        run: |
          if [ -d "allure-history" ]; then
            cp -r allure-history merged-results/history
          fi

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          wget https://github.com/allure-framework/allure2/releases/download/2.38.1/allure-2.38.1.tgz
          tar -xzf allure-2.38.1.tgz
          sudo rm -rf /opt/allure
          sudo mv allure-2.38.1 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/bin/allure

      - name: Generate report
        run: |
          allure generate merged-results -o allure-report --clean

      - name: Save history
        run: |
          mkdir -p allure-history
          cp -r allure-report/history/* allure-history || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report